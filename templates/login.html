<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Login - Poke API Tracker</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>

<body class="container" style="max-width: 500px; margin-top: 100px;">
    <article>
        <h2>Iniciar Sesión</h2>
        <form action="/login" method="post">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" placeholder="admin" required>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" placeholder="123" required>

            {% if error %}
            <p style="color: #ff3333;"><small>{{ error }}</small></p>
            {% endif %}

            <button type="submit">Entrar</button>
        </form>
    </article>
</body>

</html>
